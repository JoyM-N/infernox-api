services:

  mysql:
    image: mysql:8.0
    container_name: infernox_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: infernox
      MYSQL_USER: infernox
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3307:3306"
    volumes:
      - infernox_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: infernox_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - infernox_redis_data:/data

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: infernox_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: infernox
      PMA_PASSWORD: secret
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  infernox_mysql_data:
  infernox_redis_data:
